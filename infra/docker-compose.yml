version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: zt_postgres
    restart: always
    environment:
      POSTGRES_USER: zt_admin
      POSTGRES_PASSWORD: zt_pass
      POSTGRES_DB: zt_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zt_admin -d zt_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: zt_keycloak
    restart: always
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import

  redis:
    image: redis:7-alpine
    container_name: zt_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ../backend
    container_name: zt_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://zt_admin:zt_pass@postgres:5432/zt_dashboard
      KEYCLOAK_URL: http://keycloak:8080
      REDIS_URL: redis://redis:6379/0

  frontend:
    build: ../frontend
    container_name: zt_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:

